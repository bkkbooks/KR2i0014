body:
  text: 錦里耆舊傳卷三起天成二年至廣政二十五年宋勾延慶撰二年春二月壬午朔己亥川主斬兩川監軍使李嚴時明宗簒位川主以前朝懿戚心不自安至是内客省李嚴承樞密使安重誨密㫖貯圖謀之意添鄰部網羅於兩川乃斬之聞奏自是方思割據厲兵秣馬與東川董相公璋論秦晉之親結唇齒之約三年冬築羊馬城四年春饑荒采㪷四百文長興元年秋兩川起兵討遂府利閬并黔南萬等州牓示曰蓋聞王皇御下恩信乖而叛離臣子事君猜忌生而權變固不可刮席而忍恥膠柱闕移音開户牖以啟戎長根芽而稔患以至舉戈問罪誓衆言征旁庇齊民式求多福某國朝懿戚受命莊宗自節制於西川遇鼎移於東洛且以時變則變喪君有君因盡節而傾誠遂梯航而入貢五年之内發運無虚積數五十萬緡粗給中朝之費此則勵勤盡於天子欲表率於諸侯宇内皆知人誰不見至於屢加官秩亦荷寵光不幸間諜潛興窺顯露於閬中而立節就列鎮以益兵揺動我軍民控扼我噍軰頻將異議累具上聞冀粗軫之懐柔希稍安於方面而朝廷不以為徳轉深其疑竟乖魚水之歡自絶雲龍之契某與東川相公已聯姻好况密封圻朝聞雞犬之聲暮接笳鼙之響地里雖分於兩鎮人心何異於一家勢比同舟事資共濟今與東川㸃檢馬步軍十五萬人騎分路徃武信利閬路黔等州問逐制置之由屯集之衆其行師法令别載條章務闕晏寧必無侵虐况王氏開國久覇成都東則鐵鎖於瞿塘北則泥封於大散自是子孫失守將相離心全在蜀之烝人固未忘於覇主其因衆多之感舊奮武旅以開疆佇遣四民各安其業然後花林步月錦水行春繁華何讓於徃年爵禄重新於此日凡百士庶宜體端倪秋九月辛酉朔丙辰收下閬州牓曰昨者兩川以朝廷自生疑貳不體忠良信䜛賊之間言致諸侯之離徳始則閬州節度使李仁矩兩來奉使頻此覘窺謂於果閬之間便是控臨之地妄興謀畫濫置節旄及姦計之遂心猶隂邪而未巳數聞奏報皆請兵師欲結禍階自為戎首所以東川相公慮其稔惡須議推兇連興貔虎之師共破豺狼之窟自今月二十九日酉時得東川相公來書云二十五日夜三更三㸃親領兩川大軍四面圍褁攻打閬州城池至其日平明打破斫到李仁矩首級并捉到都指揮使姚洪馬軍指揮使王景步軍指揮使費暉等訖餘城下見機來投指揮使都頭已下便與賞給安存兼本城軍人百姓並不傷動外餘拒敵黨𩔖殺戮無餘此則天贊兵威人叶勇力遂至元兇斬首同惡就擒我師四合以環圍逆壘一攻而瓦解捷書雷迅喜氣山横想與士民同多慶快見便乘勝前進政收利州只期反掌之間便俟克敵之捷冬十月辛卯朔辛亥右廂馬步都指揮使張業收下州并黔州牓示曰今月二十一日據峽路行討伐招收使狀報黔南節度使去今月二十七日將手下元戎兵士抛本州下水奔竄尋差衙隊指揮使朱偓部領左右飛棹并諸指揮兵士乘戰船十五隻徃黔南安慰至今月二日午時囬其黔南節度使今見在梁溪團㸃元隨兵士及旋添水軍却有五百餘人排比小戰船候寧江接應兵士到却欲歸復本州其朱偓當日辰時步領戰船徃渠溪襲逐至午時與賊軍相見交戰趁下水約百餘里至酆都壩頭殺獲賊軍一百餘人斬黔南内外都指揮使郭太尉呉近思張瓊等三十餘人侵得器械衣甲不少收獲牌印四副其黔南節度使則携餘黨來小舟沿流直下忠州者竊以大舉舟師逺征峽路旗鼔纔聞其下瀨雲檣尋指於上游連降郡城繼收營監勢且捷於破竹聲有𩔖於爇蓬今則更閲捷書屢聞勝策况寧江軍以黔南為肘臂之地以渝合為饋運之衢我已斷之彼何望矣節師棄城而竄遁禆將兼隊而追擒數俘馘以既多收鎧甲而亦衆指期蕩定以固封隅凡曰軍民攸同快慰十一月左廂馬步都指揮使趙廷隱收下利州十二月左右廂馬步都指揮使李仁罕打破遂州殺節度使夏魯竒於是朝廷夷東川董相公一族二年天子歸罪安重誨後川主却脩職貢三年夏四月辛巳東川董相公擁兵來襲我至漢州昭武軍節度使趙廷隱討平之牓示曰蓋聞皇天無親唯徳是輔明神不昧稔惡則亡逆賊東川節度使董璋包藏禍心良背盟約暴興士馬急㓂封圻迎鋒而尋滅全軍單馬而竄歸本府昭武司徒統領大衆追襲餘妖則有前陵州刺史王暉覩其將亡因圖轉禍梟斬董璋父子雙獻其元闕保軍城持余旌斾念其智勇足可嘉稱且謀不自於衆人罪止歸於元惡既除心腹之患永固邦國之基某見親徃東川慰諭君民六月軍府將吏等詣衙陳狀請川主令公通押兩川公事四年春觀察判官元溥上疏請行墨制曰伏以我蜀被山帶江足食足兵實天下之强國也我公本仁祖義允文允武乃天下之賢主也以我公之賢拓土開封取威定覇固得其宜矣而况内則有紅蓮上客㕘帷幄之謀外則仗細栁將軍專斧鉞之任率土之内足可保磐石之固泰山之安顧惟冗賤何補髙明但念智者百慮必有一失愚者百慮必有一得狂夫之言聖人擇之樵童之歌哲王聴之敢罄蒭詞誠慚管見仰干朗鑒伏切怔忪竊以惟賞與刑國之利器懲惡勸善君之要權不可偏行尤須具舉歴觀徃典備考前規或王命而不通或宫室以多難列國率聞於專制諸侯或可以從權茍有利於生靈又何辭於通變昔來歙鄧禹擅命於征伐之間蜀主岐王承制於隔絶之際俱非得已實欲安人昨鄰近諸藩間諜上國有虎視狼貪之意阻君臣魚水之歡添益兵師動揺生聚况我公恒脩貢職不虧楚子之茅遽搆䜛邪竟擲魯參之杼以至兩川㰱血合縱連衡列較齊心奉辭伐罪今則旋平狖穴漸拓鴻基立功者悉望昇榮向化者皆思叙進方屬途路有阻恩信未通二星不見於雲霄三蜀久愆於雨雪將期勸善切在報功疇庸合議於䇿勲列爵宜遵於故事自今以後若且行墨制以布鴻恩式副羣情無虧大體先宜曉諭後可施行所冀設爵待功免授踰時之賞允宜稱覇之宜秋七月唐國進封蜀王册曰朕祗受天睠䖍荷帝圖敷大信而仰泣昊穹秉至公而俯臨億兆彰善殫惡必分涇渭之流崇徳報功敢忘山河之誓其有榮聯戚里任重侯藩佐白水而中興為皇家而盡節雖旁縁詿誤而竟保忠貞疏鑿未通潮海之波瀾蹔阻氛霾既定拱辰之光耀如初表章皆騐於推誠琛贐逺脩於述職得不顯其忠赤𢡟以旌酬益敦魚水之歡永契君臣之道爰求吉日乃降徽章具官孟某五緯佐天三山鎮地七年乃辨真為梁棟之材十徳俱全信是琮璜之器先皇帝經綸八極濟活兆人李通首述其緯書鄧禹常㕘於覇業同心同徳竟挾歸馬之朝不伐不矜罔恃濯龍之寵洎朕纂承鳳紀繄爾鎮守龍城鐵石彌堅菁茅不匱山川險絶每䖍向日之心玉帛駿奔來助郊天之禮有臣若此當代何加董璋久作厲階終萌逆節既辜恩於覆載欲嫁禍於勲賢叠以封章疏其鄰道䖍劉我生聚離間我忠良爾外示叶同潛懷憤激衷罄言而誘諭彼既不囬伺良便以鋤誅乃期自雪以致敢驅叛黨徑逼仁封吹虺毒以傷神奮豺牙而暴物爾則妙施成筭徑出全師鼙鼓纔鳴旋聞落爪窠巢自潰以致噬臍梓州之妖氣風驅涪水之狂波鏡浄解吾宵旰賴爾韜鈐固當銘在景鐘豈止光於信史况復備輸懇欵益驗傾䖍叙魯館之夤縁述沛中之事舊深心可見亮節期彰不有疾風焉知勁草倘無異數曷報崇庸由是並築將壇顯陞王爵兼兩藩之奥壤啟一字之真封仍循益地之通規别改旌功之懿號賜之旌鉞册以輅車雖加等之寵光爾皆不沗在睦親之義分予亦無慙於戲天鑒甚明為善者降之福祉君恩不黨立勲者厚以奬酬唯敬慎始終可延長於富貴勉承兑澤來鎮坤維可授依前檢校太尉兼中書令行成都尹劍南東川兩節度使管内營田觀察處置統押近界諸蠻兼西山八國雲南安撫制置等使仍封蜀王加食邑一千五百户實封二百户改賜忠貞匡國保大功臣散官勲如故仍令所司擇日備禮册命主者施行秋八月下教曰取威定霸乃公侯權變之方捨爵策勲乃皇王叙酬之典其或兵屯萬旅地廣山川周環列國之山河奄有全蜀之封部倘不從權而狥衆則稽録効以報功今稟命於中朝得專制而行賞但念承世家之餘慶受旌節之殊榮窮奢極侈固斵意而不為講武教民在安邊而有作徃嵗方勤述職務保永圖不幸諸藩搆成深隙此際主兵將帥争陳排難之功運策賔僚咸展出竒之畧因興武旅分蕩渠魁累破竹以焚枯連開疆而拓土其次諸司奉職庶吏推誠咸著勲勞豈忘奬荅一昨聖上以顯分忠佞遂降册封礪岳帶河銘大君之異寵輅車珠冕表列國之殊榮仍示優崇俾行墨制上自藩方之任下及州縣之官凡陟幽明許先而後奏自可保不僭不濫之典賞立功立事之人必無患於不均庶有觀於允當布告遐邇咸使聞之長興五年夏四月文武勸進即皇帝位大赦國内改唐長興五年為明徳元年以副使趙季良為相掌書記母昭裔為御史中丞掌書記李昊觀察判官徐光溥翰林學士左右馬步軍都指揮使李仁罕趙廷隱張業侯洪實分掌軍權夏四月庚午朔地震興元節度使張䖍劉武定節度使孫漢韶率部來歸由是盡得山南土宇兵甲秋七月己亥朔甲子帝寢疾而崩𦵏和陵廟號髙祖遺制册元子昶於柩前即皇帝位年十四翌日殺李仁罕并其左右佞者宋讓等數人初仁罕入蜀後充馬步軍都指揮使恣為奢豪前蜀主元妃有國色欲娶之又懼髙祖至是乃有跋扈之意樞密使王處囬左廂馬步都指揮使趙廷隱慮其難作遂請殺之三年春三月地震四年晉髙祖發兵侵昭武至劍門保寧軍節度使趙廷隱領兵拒退之是嵗改為廣政元年秋八月大水二年三年邊陲無擾百姓豐肥以輔相得人也四年夏四月蝗五年春閏三月甲申西域胡僧來朝六年至九年大有十年秋七月殺宰臣張業以其判度支虐徴商税於是籍没其家樞密使侍中王處囬免官致仕上以翰林學士李昊徐元溥為相伊審徴為通奏使知樞密院事上始親臨庶政是月秦川節度使何重建鳳州節度使石奉頵率所部來歸十一十二年時平俗阜十三年春始置貢舉十五年夏六月大水入京城漂蕩五門以其城内溺死者衆於是大赦境内秋九月東川兵馬都監王承丕反殺知府刑部侍郎郭延鈞并家族於是都指使孫欽率手下兵士斬王承丕首級奏送宣差客省使趙李托徃梓州安慰夷王承丕家族十八年冬上國舉兵攻秦州蜀失之十九年戎瀘州獠賊羅駐雍及左街都廵檢使趙季文討降之二十一年昌州獠反殺巡檢使趙漢瓊等於是左界巡檢使申彦塘討平之二十四年册皇太子二十五年行用鐵錢錦里耆舊傳卷三
