body:
  text: 錦里耆舊傳卷二起武成三年盡同光四年春宋勾延慶撰三年大梁遣使通聘書曰夫唐虞致治遵禪讓之明文湯武開基允神人之至願必有神器是膺皇圖况古今迭代之期英豪興隆之數莫不上開天命下順人心啟王覇之宏機為子孫之大計咸遵軌轍並載簡編且念與皇帝八兄頃在前朝各封異姓土茅分裂皆起將相之尊魚雁徃來久約弟兄之契歡盟甚固功業相推俄阻絶於音塵正因縁於間諜以致時衰土徳運應金行雖手足胼胝粗平多難而星辰符瑞謬付朕躬當百辟之羣情極四方之積惡爰都河洛用荅乾坤尋聞皇帝八兄奄有西陲盡朝三蜀别尊位號復統髙深一時皆賀於推崇兩國願通於情好徴曹劉之徃制各有君臣追漢楚之前蹤常分疆宇所冀同清夷夏俱活生靈載籍具存恢張無爽去嵗密聞風㫖遐想寤思憤岐隴之猖狂逼褒斜之封徼欲資牽制用速掃除遂委永平軍節度使劉鄩特遣行人先𨗳深意旋已徑差精甲將擊妖巢念數鎮之驍雄鼓六師之威勢尋聞退遁殆至滅亡允懐犄角之謀尤得輔車之利近併覽同華之奏報皆進呈褒祥書題具悉事機良多啟沃今専馳卿列備達衷懐重論金石之交别卜壎篪之分山河共永日月長懸瞻竚好音言不盡意今遣光禄卿盧玭閤門副使少府少監李元聊馳書幣専戒道途兼有㣲禮具在别幅謹白馬一十匹紅纓子鞍轡各一事紅耳叱驋馬一匹金玉閙裝四垂鞍轡一副紫叱驋馬一匹白玉裝鞍轡一副白驄馬一匹金鍍閙裝鞍轡一副烏叱驋馬一匹金鍍龍鳯五垂銀鞍轡一副烏叱驋馬一匹金鍍銀閙裝鞍轡一副白驄馬一匹金鍍銀閙裝鞍轡一副青叱驋馬一匹裏花五垂銀鞍轡一副青叱驋馬一匹陷金玉五垂鞍轡一副騮叱驋馬一匹金鍍閙裝五垂銀鞍轡一副紅耳叱驋馬一匹金鍍五垂閙裝銀鞍轡一副玉犀腰帶二條并雜物等黄排方琳腰帶一條頭尾順鉠十二事通牡丹犀排方腰帶一條頭尾順鉠十二事金香一十斤麝香五十劑犀一十株琥珀二十斤玳瑁二百斤金稜琉璃碗十隻銀稜秘色鈔鑼二面金花銀裝厨子一對金花渾銀裹龍鳯儀注槍四條金花銀裹龍鳯儀注槍四十條綾袋盛金銅甲二副并副膊兠鍪全藥物一十三味茯苓一十斤茯神一十斤酸棗仁五十斤玉鹽五斤新羅人參一十斤牛膝一十斤枳殻一十斤五味子五斤赤箭一十斤鹿茸一十對顆棗一千枚羚羊角五對牛黄一百株右件藥物等或來從燕市或貢自炎方或馨香能助於熏爐或華妙可資於寳玩至於劍涵星斗藥有君臣願伸兩國之情重固千年之約愧非縟禮粗逹深衷特希檢留幸甚謹白荅書大蜀皇帝謹致書於大梁皇帝閤下竊念早嵗與皇帝共逢昌運同事前朝俱榮倚注之恩並受安危之寄豈期王室如燬大事莫追横流泛灔於八方衰釁凌夷於九廟此際與皇帝同分茅土共統邦家扶危者力既不宣握兵者計無所出某忝列同盟之分幸居平蜀之功所宜治兵甲以固封疆聚征賦以脩進貢望星使而經年不至指雲卿而就日無期逺聞皇帝應天順人開基立極拯生靈於塗炭示恩信於豚魚東南之王氣咸歸河洛之殊祥畢至四門盡闢百度唯貞闕無競於興邦正施仁而濟衆以此内量分限不在經綸七十州自可指揮八千里半因開拓遂至萬民叶議八國言朝爰徴史册之文亦有變通之説且東漢亂離之後三國齊興西周㣲弱之時六雄競起俱非恃强逼禪皆以行道濟時雍容於揖讓之前輕重於英雄之内况西蜀開山立國燒棧為謀稱雄雖處於一隅避狄曽安於二帝鼎峙之規模尚在山呼之氣象猶存永言梁蜀之歡合認弟兄之國今䝉皇帝逺尋舊好專降嘉音俱無間諜之嫌再叙始終之約疑慮則春氷共泮開通則東海可歸光榮遽被於子孫暢遂咸敷於朝野今則盡焦勞而闕已用儉勤以歸資嘗瞻偃草之風以繼用天之道又䝉厚加賜貺别降珍竒十驥連鑣六龍並騖稱徳曽參於萬乘呈才皆過於千金載觀戀主之心並勵懷恩之志寳帶撤異方之貢名香加逺國之珍竒鋒利過於雪霜雅器價齊於金玉入用多慙於未識捧持方喜於初觀望恩而一日三秋仰徳而跬步千里自此榮遵天路繼道星槎緘章不俟於飛鳶裂帛豈勞於繫鴈欣榮慰喜併集於此時敬以專使盧卿等囬畧陳所志幸望開覽謹白謝信物等右件鞍馬及腰帶甲胄槍劍麝臍琥珀玳瑁金稜碗越甆器并諸色藥物等皆大梁皇帝降使賜貺雕鞍撼玉堅甲爍金十圍希世之珎六轡絶塵之用槍森虵檊劍耀龍鋒金稜含寳椀之光秘色抱青甆之響上藥非蜀都所紀名香從外國稱竒逺有珍華並由恵好顧酬謝而増愧仰渥澤以難勝捧閲品名實慚祗受二年春册皇太子永平元年秋九月築栁堤二年秋七月皇太子元膺作亂樞密使唐道襲等率兵敗之至翌日擒獲戮之於摩訶池畔初五月二十三日丑時天上忽震一聲有電光飛數丈或明或潛滅皆云天狗也占其下殺萬人至是勦戮之數也斯騐矣三年冬十二月雲南蠻㓂邊大渡河至沉黎四年春正月王將兵討之殺退溺河者不知其數歸降者三千餘人斬獲坦綽布燮清平官等收奪器甲馬牛軍資財用八千餘事凱歌而還是月荆南髙令公發兵攻峽路嘉王率衆具戰艦沿流下峽未至州刺史王先成已殺退嘉王以王先成伐功侮慢斬而後奏帝甚怒之天漢元年戎州界獠胡連等反七州捕盗使王球領兵討平之光天元年春三月西域胡僧滿多三藏來游峨嵋山却歸西國夏六月帝崩太子衍即皇帝位改元乾徳秋八月葬先皇永陵二年春正月有事於南郊大赦國内二月雲南遣使朝貢夏六月雙虹頭入福感寺後堂内光輝照溢廊宇良久而没三年春三月築子城西北夾寨堤引水入大内御溝水出東流仁政樓五年春二月丙午日有食之六年春雲南進江猪夏四月於大内造村坊立市肆令宫嬪着青布衫裠開酒肆食店雜男女之飾貨柴麫一如民間叫噪争打男女混雜交易而退帝與諸后妃以為笑樂咸康元年夏六月續添閏十二月厯日一紙印造施行春初頒厯只以十二月暨夏方知唐朝厯日閏添之也是嵗遣翰林學士歐陽彬通聘洛京囬莊宗皇帝遣客省使李嚴來脩好嚴朝見笏記曰伏自朱温肆逆運屬昭宗三年痛别於西秦一旦逼遷於東洛誅殘南地焚爇宫闈雖列藩悉是於唐臣無一處不從其偽命由是大唐中興皇帝念髙祖太宗之業倐爾隳張憤朱温崔𦙍之徒同謀簒弑遂乃神機迴發心鼎獨燃渇滄溟而誓戮鯨鯢炎林莽而决除􅍑兕十年對壘萬陣交鋒而久困於生靈而再逃其死士纔過汾水縛王鐵槍於馬前旋及夷門斬朱友貞於樓下劍霜未匣槍雪猶輝叚凝統八萬雄師倒戈伏死趙巖知一人應運引頸待誅遂使賊將寒心謀夫拱手取乾坤只勞於八日救塗炭遂定於四方備振皇威咸遵帝力今則秦庭貢表兩浙稱臣淮南陳負拜之儀囬紇備朝天之禮纔安宇宙便息干戈未盡梟夷方議除剪豈謂大蜀皇帝柔懐逺邇居安慮危喜我帝祚中興羣妖悉滅特遣蘇張之士來追唐蜀之歡吾皇迴感於蜀皇復禮逺酬於厚禮臣則叨承𤣥造獲奉皇華載馳得面於天顔戰汗不任於跼地臣無任感恩荷聖踴躍屏營之至冬十月庚申朔甲子帝幸天雄軍秦川即天雄軍文武臣僚諌諍不允駕至利州唐國發大軍已過金牛帝大驚扈從百官旋各分散輦轂窘迫奔馳歸國十一月庚寅朔丙申帝歸入内京城沸撓至壬寅唐國使李嚴走馬入城宣唐勅命安撫三軍萬姓又云六軍使齊王宗弼先已有狀歸降興聖太子令見引領大軍相次即到帝與太后一時號泣左右悲哀帝遂召歐陽彬脩降表曰臣聞滄海澄波納百谷朝宗之水皇風扇物來萬方向化之人蓋由負罪不誅衘寃獲免鄭伯沐焚棺之惠許男荷解縛之仁得不頂戴穹旻仰祈渥澤恭惟皇帝陛下承乾啟運握鏡開圖發檄而上應天心恤物而下民從欲繼十八祚崇隆之徳髙步泰階應一千年挺特之風廣施王道混車書於天下走聲教於域中而臣僻在遐方逺居蜀郡承先父經營之業為巴人主者之司但荒聾瞽之迷罔顧危亡之患玉帛既乖於正朔苞茅是闕於薦差殊不知唐徳維新𤣥功再造致王師之逺辱勞雄武以遐臨太陽照而氷雪自消睿澤敷而黔黎盡泰而臣自知罪舋不敢逭逃命戎士以倒戈挈壺漿而塞路遂即舁棺麾下束手馬前向丹闕以馳魂掩黄沙而聴命豈謂魏王布惠真宰垂仁入臣境無犯纎毫問臣罪不加一二傳陛下好生之㫖闡堯天闕惡之文釋殘生於撲蛾之燈全必死於戲魚之鼎使肌骨重生於聖日焦枯再沐於天波然則盡節輸誠安足以贖臣之罪塗肝碎膽不足以報君之恩幸得捧日傾心歸明向化積懼而鋒鋩聚背推忠而丹赤貫心今則已逺龜城將趨鳯闕雖亡家國喜歸有道之朝縱别鄉園幸在太平之化臣以正月二日與母親并姨舅兄弟骨肉等發離當道奔赴京師攀望聖慈無任瞻天仰徳惶懼戰越死罪之至發表後魏王車駕至漢州乙巳王宗弼領兵先入城是夜王宗弼遷帝於西宫至丙午自稱兵馬留後散差人收内庫金銀寳玩并諸王節相宅内財物戊申勅牓曰朕以蜀部封疆本是我唐境土爰從兵革逺阻江山當偽梁簒弑之時致宗廟陵夷之難遂茲割據蓋逐便安雖行建號之謀乃是從權之道况復蜀主先父素是本朝舊臣常懐忠孝之心每俟興隆之運唯期恢復却效傾輸朕以初殄冦讐重興社稷撫諭之恩既廣優勤之意常深須務綏和貴諧混一遂令元子兼命宰臣逺安徯后之心既叶來王之願遐想王師行李已及彼地城池逺降詔書明行示諭料其素志必契夙心當符魚水之歡永保山河之誓一應偽蜀文武官僚等或本朝舊族或本朝舊賢或抱節於軍戎或著名於鄉曲久從暌隔常軫情懐宜知乃睠之恩各勵歸誠之欵今以降勅命誡約諸道兵帥如西川果决歸明到城内不得驚擾但思効順勿致懷疑己酉齊王宗弼斬東院開府宋光嗣西院開府景潤澄北院開府歐陽晃成都尹韓昭等出牓示奉魏王教令宋光嗣等久居内庭恣行權柄幻惑少主减削三軍仰處斬訖奏甲寅蜀主與宰臣王楷文武百官素服衘壁牽羊輿櫬出城降魏王太子於是焚櫬釋罪望北拜恩却歸入城魏王遣李嚴於三市慰諭軍人百姓丁巳魏王興聖太子入城閏十二月己丑朔斬偽齊王宗弼并男駙馬都尉承班等牓曰竊以前件人等擅廢本主專殺内臣潛取資財將為己物爰自收降城邑又無犒賞三軍俱是元凶須加顯戮初齊王宗弼多收内庫并諸節將宅寳貨於城外獻魏王及招討令公魏王曰蜀之山河皆我家之有方欲普施惠化何用寳貨而為遂不受至是誅之又斬秦州節度使王宗休以其脩行宫迎蜀主又引軍收蜀竊以王宗休食人之禄於國不忠貴擁節旄位居屏翰飾宫室以誤主引師旅而收城悖逆之深莫甚於此豈可君遷臣在國改家存顯示梟夷神人懽快同光四年春正月戊午朔前戎州刺史蕭懐武眉州刺史鮮于皋作亂擒獲與從皆伏誅庚申蜀主及太后嬪妃宰臣王鍇庾傳素張格許寂等進發入洛歸朝甲子走馬使到宣勅斬招討使郭崇韜父子四人為到蜀取豪富家金錢䭾載歸京闕戊申奏遂降勅誅之甲戌北都留守孟知祥除授同中書門下平章事充劍南西川節度使到府戊寅魏王以孟公至大慈寺拜僖宗御容又至延祥院見偽蜀少主真容並令掃抺塑北方天王一身至今存焉庚寅魏王發離成都歸京至綿州康延孝以殿後軍作亂囬趨成都屯廣漢川王頗有憂色䕶軍焦彦賔指畫討伐與東川節度使董瑋㑹軍擒康延孝送至利州魏王斬之於是兩川平定夏四月丁亥朔己丑蜀主與母徐氏太后諸王公主嬪妃至雍州時莊宗出征王皇后矯詔就秦川驛害之至明宗朝追封順正公𦵏於京兆府三趙村是月明宗即帝位改元天成元年甲午魏王平蜀囬至渭南諸軍潰散為帳下親軍所縊錦里耆舊傳卷二
