body:
  text: 錦里耆舊傳卷四起偽廣政二十八春年冬至乾徳四年宋勾延慶撰國朝收蜀十二月癸亥偽蜀太子秦王𤣥哲統領兵士至劍門時招武諸路兵馬並已奔退遂囬入城正月癸酉前軍都陪署王太傅全斌統領大軍至漢州界蜀主差偽通奏使伊審徴走馬送降欵十七日前軍都署尋請先鋒都監康延澤入城安撫十九日大軍至昇僊蜀主具禮降二月四日南路戰棹都步署劉太傅光乂収峽路至府是嵗大宋乾德三年也十七日蜀主與偽太后妃嬪發離成都水路下峽朝天先差弟偽雅王仁贄北路表馬奉表曰臣聞三皇御宇萬邦歸有道之君五帝垂衣六合順無為之化其或未知歴數猶昧存亡致興天討之師實懼霆臨之罪敢祈英睿俯聴哀鳴臣誠驚誠懼頓首頓首伏念生自并門長於蜀地幸以先君之基構得從㓜嵗以纂承只知四序以推遷不識三靈之改卜伏自皇帝陛下大明出震盛徳居乾聲教被於遐荒慶澤流於中夏當凝旒玉殿之始闕小以事大之儀洎告𩔖圓丘已來稽執玉持帛之敬蓋蜀地途遐僻阻隔徽猷已慙先見之明因有後時之責今則皇威赫怒聖畧風行干戈所指而無前鼙鼓纔施而自駭山河郡縣半入於華封將率倉儲幸歸於文籍但念臣中外二百餘口慈母七十餘年日承訓撫之恩粗効孝慈之道實願克終甘㫖冀保衰年其次則子孫之團圓守血食之祭祀伏乞皇帝陛下容之若地蓋之如天特軫仁慈以寛危辱臣輒敢徴其故實上瀆宸聰竊念劉禪有安樂之封叔寳有長城之號背恩歸欵得獲生全願眇昧之餘魂得保全而為幸庶使先君寢廟不為樵採之場老母庭除且有問安之便見今保全府庫巡遏軍城不使毁傷終期臨照車書混其文軌正朔奉於靈臺敢布腹心恭聴赦宥臣謹率文武見任職員望闕拜首上表歸命披瀝肺肝以聞又上宰臣樞密使狀竊念頃自北京即隨先父洎臨西蜀嗣守餘基自量小國之封疆常阻大朝之旦朔伏自皇帝登位宸極禮盛郊禋今預梯航願同臨照而以阻遥障險稍易嵗時今則逺勞王師恭行天討有征無戰詎可抗威棄甲倒戈尋皆効順具陳降欵上達冕旒所希者存濟活於蒼生報劬勞於老母忠惟奉主孝則養親固於生平無所覬望許男衘壁已䝉解釋之儀虞舜垂衣佇保安全之望丹誠備冩雪涕難勝伏惟某官叶贊萬機懷柔八表逈敷恩信並及幽遐願垂前席之言特加敷奏冀遂保家之墾終養晨昏烏反哺以知恩竊將比喻雀衘環而報徳以荷生成倚賴感銘陳詞罔盡遐瞻徳宇但瀝䖍誠今專遣親弟仁䞇詣闕上表待罪勅蜀主省上表率文武見任官等望闕瀝懇歸命事具悉朕自皇天睠命率土樂推將期徳報萬方不恃威加四海乃睠益部僻處一隅茍黎庶之獲安非經營之在意一昨災纒蜀地舋自并門既興王者之師遂授將軍之鉞事非獲已須用至兵我具直詞彼衆自敗下劍門而賈勇指井絡以長驅中宵火燃兆庶何罪徑馳驛騎嚴戒前鋒廣宣來者之懷徧諭弔伐之意果能率官屬而効順拜表疏以祈恩託我慈親述乃寢廟封府庫而待罪保生聚以輸誠朕方示信懷來不逼人險保無他慮當體優隆國有舊章不違來請所宜悉也春寒想比清休書㫖不多及四月一日殺西川兵士三萬人初前軍都部署瑯琊公受降入城後應是西川歸降兵士並皆安撫相以㸃齪要起發赴京衆軍動揺將謀作亂乃引就夾城内㸃㨂俾其不意遂盡殺之㕘政吕侍郎餘慶知成都府軍府事偽蜀指揮使全師雄反自稱王據漢州金堂縣三學山聚徒數萬人攻成都并諸縣與官軍格閗又陵州賊袁廷裕反資州黄承浦普州劉澤時人號之劉硬弓昌州趙令等反各據本州與全師雄應接所在州郡道路不通又嘉州馬承逸反屯犍為山進攻州城前軍戰棹副部署武懷節擊破之盡戮徒黨夏五月十六日蜀主到京朝見皇帝卯時御大明殿蜀主見左右金吾六軍儀仗殿中省法物並於殿前卓立三軍於明徳門外着隊排立蜀主并弟仁䞇男𤣥哲等宰臣李昊已下三十二人五更三㸃自玉津園乘馬到明徳門西廊幕次下馬至寅時着白衫小㡌子勒帛詣明徳門立班閤門使李廷憲至蜀主遣官屬一員持表待罪將入大内奉傳宣㫖釋放勅示諭並俯伏於地令通事舍人持起有勅取法上天廣覆下土既叶混同之慶永乘臨照之光方喜來朝何勞俟罪體兹睠待無至兢憂蜀主已下謝恩訖奉宣賜衣服幞頭靴笏等謝恩却歸幕次換衣服冠帶各乘馬入厚載門右銀臺門下馬閤門使李廷憲引蜀主入明徳殿外幕次祗候見蜀主進金器八百兩玉鞍帶二條銀鋌一萬兩集賢相公㕘知政事侍郎及文武官已下江南兩浙進奉使並立班陪位稱賀宣徽使承㫖奉禮畢索肩下簾皇帝歸内皇帝自大内乘逍遥子上明徳樓宣詔蜀王已下上樓立班奉宣慰諭諸軍於樓前逐隊安歸營後却乗逍遥子赴大明殿宴奉宣宰臣蜀主已下並赴宴動教坊樂蜀主進金酒器一副重一百六十兩通龍鳳犀腰帶一條宰臣節相已下進賀蜀主朝見宣賜蜀主衣一副六件玉腰帶一條金鞍轡馬一匹散馬五匹絹五千疋錦綺綾羅紗縠衣着一千疋錢三千貫文金鍍銀稜瓷器四百事銀漆稜器千六百素漆器五百事錦綉被毡褥二副宅一院四百八十間鋪陳售用什物全又賜國母李氏衣一對金器三百兩絹一千疋售用銀器一千兩錦被毡褥鋪陳全蜀主弟仁䞇仁裕仁撡男𤣥哲𤣥珏各賜衣一襲幞頭靴笏等玉腰帶銀器各七百五十兩衣着各五百疋絹各一百疋散馬各一匹金鍍銀鞍馬各一匹錦被氊褥鋪陳全雅王孟仁䞇别宣賜交椅水罐銀大燎爐并銀器二百五十兩尋有除目李昊工部尚書歐陽烱左散騎常侍張元倣工部郎中母守素工部侍郎胡韞司天少監郭徴膳部郎中韓保昇殿中監髙諷太府卿尹文舉駕部郎中范禹偁鴻臚卿劉暠少府少監韓嶼庫部郎中鮮于撡祠部員外郎趙元拱虞部員外郎丘世隆比部員外郎孟仁䞇右神武軍統軍孟仁撡左監門衛上將軍孟仁裕右監門衛上將軍孟𤣥珏左千牛衛上將軍王昭逺右千牛衛上將軍李進右千牛衛大將軍景處塘左羽林衛大將軍袁可鈞左屯衛大將軍髙延昭左驍鋭大將軍蘇廷超清道率府率李遵皓左監門率府率授蜀王秦國公制門下伯禹𨗳川黒水本梁州之域河圖括象岷山真井絡之墟考職方之地圖比劍南之徼道屬中原多事逺服未賔山河既限於侯封車服遂踰於王制朕削平屬縣重正皇綱復周漢之舊疆寵綏羣后採唐虞之大訓協和萬邦六載於茲百揆時叙禮樂征伐之柄出自朕躬蠻夷戎狄之鄉咸脩職貢一昨順先庚而受律法時雨以興師舜干暫舞於兩階湯網豁開於三面弔民之罪朕無愧焉咨爾偽蜀王孟昶挺生公族稟慶侯門值唐朝將季之辰襲蜀土已成之業撫彼郡邑久歴嵗華而能察天地之惡盈知神人之助順盡率羣吏來降大君望北闕以拜章指南陔而請命得不開懷禮遇撫弱流恩官班特越於彛章保䕶彌光於大信豈比夫魏封劉禪纔升驃騎之班隋待蕭琮惟列莒公之號今茲示寵以欲從人命作帝師俾容開府帶漢相專車之貴列秦川萬户之封併而授之斯為異數仍加禄俸用表優隆爾宜思前代之命官體我朝之加等勉荷非常之澤無忘匪懈之心服佩恩光徃踐厥位可封秦國公授孟元哲兖州節度使制門下朕聞魏將降蜀君臣俱列於散官隋帝平陳子弟不聞於封爵皇家順景風而行賞同時雨以濟師當敵境未賔霆下戒嚴之令暨危邦請命雲垂利得之恩矧復降婁古封掌武崇秩曲阜是伯禽之國太尉乃周勃之官山河距九州之雄紱冕冠王公之貴舉為賞典斯實異恩魏國長子孟𤣥哲禮法矜莊神彩英秀駛脩途於早嵗播令聞於蜀川正朔未同乎列國而人稱世子車書既混於大朝而自是良臣以爾昔在三川常居二職贊厥父之効順保祖母之髙年予嘉乃心豈限彛制是命陟將壇於東夏整武事於南宫憲秩封侯用光殊渥將表臨戎之寄更増光禄之勲爾其分天子之憂勤出將軍之號令與其改絃易調不若從俗以安民布政頒條予誠有望榮家奉國爾其勉之夏六月蜀主薨遺表曰臣聞大數有限萬化無窮歴觀今古以攸同在賢愚而不免將啟手而歸土再瀝懇而聞天臣誠悲誠戀頓首頓首伏念臣謬承父業竊據坤維數千里之山河四十年之統攝雖有臨深之懼且無事大之規是以逺勞王師恭行天討上思老母下念生民潛收拒轍之心旋露授戈之請伏惟皇帝陛下納汙道廣來逺恩寛遐頒彩鳳之書遽釋牽羊之罪伏自逺辭錦里獲覩瑶墀帝澤天恩曽無虚日皇華驛騎長是盈門仍賜官勲方圖朝謝不謂偶縈疾疹遽覺沉㣲伏䝉皇帝陛下軫睿念以殊深降國醫而薦至比冀稍聞瘳損何期漸見彌留將别聖朝即歸幽壤絶拜章於雙闕一息雖存命易簀於病躬五神已耗伏惟皇帝陛下長新鳳歴永覇鴻圖鎮居四海之尊永作兆民之慶臣之老母臣之遺孤仰荷聖恩夫復何憂臣無任瞻天戀聖涕泗激切屏營之至夏六月十九日榮州賊楊徳暉等反陵州袁廷裕助五千餘人圍逼州城是月二十六日南路都部署彭城公討平陵州賊袁廷裕二十九日楊徳暉潰散所在縣鎮遮截梟闕畧盡秋九月嘉州指揮使吕翰反殺前軍戰棹副部署武懷節據州城自稱相府是月漢州山菁賊全師雄死徒黨潰散冬十一月彭城公擊吕翰破之收下嘉州四年春三月資州賊黄承浦榮州賊楊徳暉等歸投起遣上京自楊徳暉趙令等脅從夷獠依附山林擁衆叛離不順朝化南路都部署彭城公命偏將討平之今則汙莱之囚盡闢雈苻之盗漸除萬民知歸兩蜀寧静覩堯湯之代懽億兆之心矣錦里耆舊傳卷四
