body:
  text: 錦里耆舊𫝊載記𩔖提要臣等謹案錦里耆舊𫝊四卷一名成都理亂記宋勾延慶撰延慶字昌裔自題稱前榮州應靈縣令其書乃紀王氏據蜀時事宋史藝文志文獻通攷皆作八卷陳振孫書録解題稱開寳三年祕書丞劉蔚知榮州得此𫝊請延慶修之起咸通九載迄乾徳乙丑云云按今本止四卷起僖宗中和五年無懿宗咸通間事振孫又稱自平蜀後迄祥符己酉朝廷命令政事因革以至李順等作亂之迹皆略載之張約為之序延慶在開寳時去祥符尚逺似不能續記至此而平蜀後事及張約序此本亦無之疑振孫所見八卷者乃别一本為後人所増益而此本四卷或猶延慶之舊也書雖以耆舊𫝊為名而不以人系事其體實近編年所録兩蜀興廢之迹亦頗簡畧惟於詔勅章表書檄之文載之獨詳中間如前蜀咸康元年唐兵至成都王宗弼刼遷王衍於西宫通鑑在十一月甲辰而此書作乙巳又宋太祖賜後蜀主孟昶詔一首其文多與宋史不同如此𩔖皆可以備㕘攷又陳振孫稱為平陽勾延慶按書中於後蜀主多所稱美疑出蜀人之詞攷孟昶時有校書郎華陽勾中正者後入宋為屯田郎中延慶或即其族則當為華陽人矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:91fbb6c73e31e80d81f5209dc420cb4d7ae7751d15791c32849a0169a23d33a0
