  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0014_WYG_004-1a, image: WYG0464/WYG0464-0197a.png}
body:
  text: 錦里耆舊傳卷四起偽廣政二十八春年冬至乾德四年宋勾延慶撰國朝收蜀十二月癸亥偽蜀太子秦王玄哲統領兵士至劍門時招武諸路兵馬並已奔退遂回入城正月癸酉前軍都陪署王太傅全斌統領大軍至漢州界蜀主差偽通奏使伊審徴走馬送降欵十七日前軍都署尋請先鋒都監康延澤入城安撫十九日大軍至升仙蜀主具禮降二月四日南路戰棹都步署劉太傅光乂收峽路至府是嵗大宋乾德三年也十七日蜀主與偽太后妃嬪發離成都水路下峽朝天先差弟偽雅王仁贄北路表馬奉表曰臣聞三皇御宇萬邦歸有道之君五帝垂衣六合順無為之化其或未知歷數猶昧存亡致興天討之師實懼霆臨之罪敢祈英睿俯聽哀鳴臣誠驚誠懼頓首頓首伏念生自并門長於蜀地幸以先君之基構得從幼嵗以纂承只知四序以推遷不識三靈之改卜伏自皇帝陛下大明出震盛德居乾聲教被於遐荒慶澤流於中夏當凝旒玉殿之始闕小以事大之儀洎告類圓丘已來稽執玉持帛之敬蓋蜀地途遐僻阻隔徽猷已慙先見之明因有後時之責今則皇威赫怒聖略風行干戈所指而無前鼙鼓才施而自駭山河郡縣半入於華封將率倉儲幸歸於文籍但念臣中外二百餘口慈母七十餘年日承訓撫之恩粗效孝慈之道實願克終甘旨冀保衰年其次則子孫之團圓守血食之祭祀伏乞皇帝陛下容之若地蓋之如天特軫仁慈以寬危辱臣輒敢徴其故實上瀆宸聰竊念劉禪有安樂之封叔寶有長城之號背恩歸欵得獲生全願眇昧之餘魂得保全而為幸庶使先君寢廟不為樵採之場老母庭除且有問安之便見今保全府庫巡遏軍城不使毁傷終期臨照車書混其文軌正朔奉於靈臺敢布腹心恭聽赦宥臣謹率文武見任職員望闕拜首上表歸命披瀝肺肝以聞又上宰臣樞密使狀竊念頃自北京即隨先父洎臨西蜀嗣守餘基自量小國之封疆常阻大朝之旦朔伏自皇帝登位宸極禮盛郊禋今預梯航願同臨照而以阻遙障險稍易嵗時今則逺勞王師恭行天討有征無戰詎可抗威棄甲倒戈尋皆效順具陳降欵上達冕旒所希者存濟活於蒼生報劬勞於老母忠惟奉主孝則養親固於生平無所覬望許男銜壁已蒙解釋之儀虞舜垂衣佇保安全之望丹誠備寫雪涕難勝伏惟某官叶贊萬機懷柔八表逈敷恩信並及幽遐願垂前席之言特加敷奏冀遂保家之墾終養晨昏烏反哺以知恩竊將比喻雀銜環而報德以荷生成倚賴感銘陳詞罔盡遐瞻德宇但瀝虔誠今專遣親弟仁贄詣闕上表待罪敕蜀主省上表率文武見任官等望闕瀝懇歸命事具悉朕自皇天眷命率土樂推將期德報萬方不恃威加四海乃眷益部僻處一隅茍黎庶之獲安非經營之在意一昨災纒蜀地舋自并門既興王者之師遂授將軍之鉞事非獲已須用至兵我具直詞彼衆自敗下劍門而賈勇指井絡以長驅中宵火燃兆庶何罪徑馳驛騎嚴戒前鋒廣宣來者之懷遍諭弔伐之意果能率官屬而效順拜表疏以祈恩託我慈親述乃寢廟封府庫而待罪保生聚以輸誠朕方示信懷來不逼人險保無他慮當體優隆國有舊章不違來請所宜悉也春寒想比清休書旨不多及四月一日殺西川兵士三萬人初前軍都部署琅琊公受降入城後應是西川歸降兵士並皆安撫相以點齪要起發赴京衆軍動搖將謀作亂乃引就夾城內點㨂俾其不意遂盡殺之參政吕侍郎餘慶知成都府軍府事偽蜀指揮使全師雄反自稱王據漢州金堂縣三學山聚徒數萬人攻成都并諸縣與官軍格閗又陵州賊袁廷裕反資州黃承浦普州劉澤時人號之劉硬弓昌州趙令等反各據本州與全師雄應接所在州郡道路不通又嘉州馬承逸反屯犍為山進攻州城前軍戰棹副部署武懷節擊破之盡戮徒黨夏五月十六日蜀主到京朝見皇帝卯時御大明殿蜀主見左右金吾六軍儀仗殿中省法物並於殿前卓立三軍於明德門外著隊排立蜀主并弟仁贄男玄哲等宰臣李昊已下三十二人五更三點自玉津園乘馬到明德門西廊幕次下馬至寅時著白衫小帽子勒帛詣明德門立班閣門使李廷憲至蜀主遣官屬一員持表待罪將入大內奉傳宣旨釋放敕示諭並俯伏於地令通事舍人持起有敕取法上天廣覆下土既叶混同之慶永乘臨照之光方喜來朝何勞俟罪體兹眷待無至兢憂蜀主已下謝恩訖奉宣賜衣服幞頭靴笏等謝恩却歸幕次換衣服冠帶各乘馬入厚載門右銀臺門下馬閣門使李廷憲引蜀主入明德殿外幕次祗候見蜀主進金器八百兩玉鞍帶二條銀鋌一萬兩集賢相公參知政事侍郎及文武官已下江南兩浙進奉使並立班陪位稱賀宣徽使承旨奉禮畢索肩下簾皇帝歸內皇帝自大內乘逍遙子上明德樓宣詔蜀王已下上樓立班奉宣慰諭諸軍於樓前逐隊安歸營後却乘逍遙子赴大明殿宴奉宣宰臣蜀主已下並赴宴動教坊樂蜀主進金酒器一副重一百六十兩通龍鳳犀腰帶一條宰臣節相已下進賀蜀主朝見宣賜蜀主衣一副六件玉腰帶一條金鞍轡馬一匹散馬五匹絹五千匹錦綺綾羅紗縠衣著一千匹錢三千貫文金鍍銀稜瓷器四百事銀漆稜器千六百素漆器五百事錦繡被氈褥二副宅一院四百八十間鋪陳售用什物全又賜國母李氏衣一對金器三百兩絹一千匹售用銀器一千兩錦被氈褥鋪陳全蜀主弟仁贄仁裕仁撡男玄哲玄珏各賜衣一襲幞頭靴笏等玉腰帶銀器各七百五十兩衣著各五百匹絹各一百匹散馬各一匹金鍍銀鞍馬各一匹錦被氊褥鋪陳全雅王孟仁贄别宣賜交椅水罐銀大燎爐并銀器二百五十兩尋有除目李昊工部尚書歐陽炯左散騎常侍張元倣工部郎中母守素工部侍郎胡韞司天少監郭徴膳部郎中韓保升殿中監髙諷太府卿尹文舉駕部郎中范禹稱鴻臚卿劉皓少府少監韓嶼庫部郎中鮮于撡祠部員外郎趙元拱虞部員外郎丘世隆比部員外郎孟仁贄右神武軍統軍孟仁撡左監門衛上將軍孟仁裕右監門衛上將軍孟玄珏左千牛衛上將軍王昭逺右千牛衛上將軍李進右千牛衛大將軍景處塘左羽林衛大將軍袁可鈞左屯衛大將軍髙延昭左驍鋭大將軍蘇廷超清道率府率李遵皓左監門率府率授蜀王秦國公制門下伯禹𨗳川黑水本梁州之域河圖括象岷山真井絡之墟考職方之地圖比劍南之徼道屬中原多事逺服未賔山河既限於侯封車服遂踰於王制朕削平屬縣重正皇綱復周漢之舊疆寵綏羣后採唐虞之大訓協和萬邦六載於茲百揆時敘禮樂征伐之柄出自朕躬蠻夷戎狄之鄉咸修職貢一昨順先庚而受律法時雨以興師舜干暫舞於兩階湯網豁開於三面弔民之罪朕無愧焉咨爾偽蜀王孟昶挺生公族稟慶侯門值唐朝將季之辰襲蜀土已成之業撫彼郡邑久歷嵗華而能察天地之惡盈知神人之助順盡率羣吏來降大君望北闕以拜章指南陔而請命得不開懷禮遇撫弱流恩官班特越於彛章保護彌光於大信豈比夫魏封劉禪才升驃騎之班隋待蕭琮惟列莒公之號今茲示寵以欲從人命作帝師俾容開府帶漢相專車之貴列秦川萬户之封併而授之斯為異數仍加祿俸用表優隆爾宜思前代之命官體我朝之加等勉荷非常之澤無忘匪懈之心服佩恩光往踐厥位可封秦國公授孟元哲兖州節度使制門下朕聞魏將降蜀君臣俱列於散官隋帝平陳子弟不聞於封爵皇家順景風而行賞同時雨以濟師當敵境未賔霆下戒嚴之令暨危邦請命雲垂利得之恩矧復降婁古封掌武崇秩曲阜是伯禽之國太尉乃周勃之官山河距九州之雄紱冕冠王公之貴舉為賞典斯實異恩魏國長子孟玄哲禮法矜莊神彩英秀駛修途於早嵗播令聞於蜀川正朔未同乎列國而人稱世子車書既混於大朝而自是良臣以爾昔在三川常居二職贊厥父之效順保祖母之髙年豫嘉乃心豈限彛制是命陟將壇於東夏整武事於南宫憲秩封侯用光殊渥將表臨戎之寄更增光祿之勳爾其分天子之憂勤出將軍之號令與其改絃易調不若從俗以安民布政頒條豫誠有望榮家奉國爾其勉之夏六月蜀主薨遺表曰臣聞大數有限萬化無窮歷觀今古以攸同在賢愚而不免將啓手而歸土再瀝懇而聞天臣誠悲誠戀頓首頓首伏念臣謬承父業竊據坤維數千里之山河四十年之統攝雖有臨深之懼且無事大之規是以逺勞王師恭行天討上思老母下念生民潛收拒轍之心旋露授戈之請伏惟皇帝陛下納汙道廣來逺恩寬遐頒彩鳳之書遽釋牽羊之罪伏自逺辭錦里獲覩瑶墀帝澤天恩曽無虛日皇華驛騎長是盈門仍賜官勳方圖朝謝不謂偶縈疾疹遽覺沉微伏蒙皇帝陛下軫睿念以殊深降國醫而薦至比冀稍聞瘳損何期漸見彌留將别聖朝即歸幽壤絶拜章於雙闕一息雖存命易簀於病躬五神已耗伏惟皇帝陛下長新鳳歷永霸鴻圖鎮居四海之尊永作兆民之慶臣之老母臣之遺孤仰荷聖恩夫復何憂臣無任瞻天戀聖涕泗激切屏營之至夏六月十九日榮州賊楊德暉等反陵州袁廷裕助五千餘人圍逼州城是月二十六日南路都部署彭城公討平陵州賊袁廷裕二十九日楊德暉潰散所在縣鎮遮截梟闕略盡秋九月嘉州指揮使吕翰反殺前軍戰棹副部署武懷節據州城自稱相府是月漢州山菁賊全師雄死徒黨潰散冬十一月彭城公擊吕翰破之收下嘉州四年春三月資州賊黃承浦榮州賊楊德暉等歸投起遣上京自楊德暉趙令等脅從夷獠依附山林擁衆叛離不順朝化南路都部署彭城公命偏將討平之今則汙萊之囚盡闢雈苻之盜漸除萬民知歸兩蜀寧靜覩堯湯之代歡億兆之心矣錦里耆舊傳卷四
