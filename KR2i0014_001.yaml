body:
  text: 錦里耆舊傳卷一起中和五年正月至蜀武成元年宋勾延慶撰正月地動一月十餘度以七曜占之多兵飢饉三月改光啓元年夏四月維州山崩石墜飛塵滿空五月除授顧彥朗東川節度使二年東川遣鄭君雄率衆侵略至德陽縣殺破斬鄭君雄又常厚自峽中率兵據左綿僖宗皇帝到京後天下十道共修京闕之次胡魯子反燒悉盡駕幸寶雞又幸山南干戈復起四海不寧三年冬十月十軍軍容使田令孜除授西軍監軍使十一月到府昭宗皇帝即位改元文德元年秋八月除授韋太尉昭度劍南西川節度使陳太師知之乃治兵講武更置黃頭軍三都監軍使以書召閬州王司徒建計其過綿水即出兵拒之將激其怒必攻諸州所在發兵交戰冀韋太尉來以兵隔之則誣以王司徒起兵侵境九月王司徒大軍至閉城門不納冬十月丁卯川軍與王司徒戰川軍敗退入城是日天色隂慘先主廟上黑霧起至暮王司徒抽軍回七里亭丙子王司徒引軍入漢州界攻剽四面州縣東西兩川皆懼之龍紀元年春二月庚午陳太尉發軍與王司徒大戰於三郊川軍敗績於是劉修濠寨點丁牢城夏四月軍容招前定戎軍節度楊晟建節於彭州與陳敬瑄為裏也五月三都軍敗退歸府城王司徒據漢州城出軍把斫北路又彌牟鎮下先鋒寨新都縣下中軍寨秋七月節度使韋太尉到川用王司徒為衙內都指揮使奏割卭蜀黎雅四州充永平軍節度使川莊陳太師牢城韋太尉具旌節於城下以示城內百姓軍人告之曰新使在此何閉城門陳太師令左右詬罵城下云有鐵劵見在豈可違先帝命乎王司徒于東北面下寨韋太尉城西北下寨未經旬日嘉眉州降大順元年春正月分兵擊卭州都知兵馬使任可知殺刺史毛湘以城降又東川助兵三千人城外置牢行府徵科諸州稅賦嘉眉州運糧供軍內飢乏死者不可勝數父母委棄雛稚不相保養居人多以藜藿充濟皆有菜色殍仆者甚衆軍人多偷刈新麥每一斗直二千餘金亦潛於韋太尉寨市易鹽相次人數稍多遂成隊有聞於太尉太尉曰一城飢餓忍不救之並不要問城內亦有聞於陳太師太師云吾尚恨無計救恤一任逐便以此稍布市井夏五月城內乏食民俗惶惶遞相欺凌無有怕懼所在斬殺處處暴尸其有軍都處則稍閙别街巷則寂靜是月資雅黎三州相次歸降時以攻圍日久其城未拔王司徒白韋太尉曰今領數萬之衆勞師以事蠻夷近聞洛陽以來藩鎮相噬朝廷姑息不暇主上憂勞不如以兵威靜中原是國之本相公盍歸覲面奏此事韋公然之翌日又諷三軍於行府門告糧闕乃執韋公親吏駱别鶴臠而食之韋公益懼因召王司徒謂曰某年衰風恙恐不任持已具奏聞即便離任今表申奏署授司徒節度留後行營招討使候至闕庭奏聞請降西川旌節在後更保功業以慰民望乃以牌印授之六月己卯進發王司徒祖餞送至新都韋公請回無更逺離帳幄韋太尉發後王司徒移居中軍寨城內百姓往來交易販米入城以竹筒量賣截筒深一寸濶一寸二百文須三五人共賣一人接錢兩人把手定則以米寫衣袖中將歸研之煮湯共喫老弱者難買或聚或散固無行鋪街巷飢人死者無數或遇一夜風雨來日便成白骨冬十月發兵圍彭州大順二年秋城內糧盡八月庚寅陳敬瑄田令孜開城門携牌印出降王司徒與之並轡入城安撫軍人百姓放陳太師歸花林坊本宅田令孜歸碧雞坊宅時克定州府之後以萬民久罹塗炭初見廓清行滌蕩之恩布寬仁之令景福元年春有詔貶田令孜授湖南監軍陳敬瑄於雅州安置王司徒慮其生變縊令孜於府城斬敬瑄於新津具表疏其惡也三年夏彭城內窘蹙初年米每斗五千第二年十千三年糧盡百姓遞相啖食五月庚申楊晟自刎城門開自景福元年五月二十日圍城至三年五月二十三日首尾三年蓋楊晟不識天時致害民庶秋七月與東川顧相公修好結秦晉之姻是嵗改為乾寧元年二年春三月創徴雜稅綾一匹一百文絹一匹七十文布一匹四十文豬每頭一百文時修寶歷寺有僧智廣俗姓崔氏善救病以竹片為杖拍其痛處決之無不立愈瘸者便伸跛者能行其餘疾苦應手痊損川主司徒崇重之請於寶厯寺為人療病所得錢物回用修造遂於寺內五丈天王閣下居止於是病者載來皆得痊愈日獲三五千告諸貧者不用施錢時號聖僧師本在雅州開元寺揭席神堂內居三年起軍收東川四年秋九月平定東川五年秋九月改元光化元年江瀆池魚無數皆死浮出水面長尺餘以車般之送於城外二年秋八月差發決雲軍使田師侃統押兵士三指揮收獲閬州次克己蓬壁三州三年春三月田師侃移軍收渝州四年改元天復元年封蜀王五年春三月發舟師一萬五千人鎖峽是嵗大水嘉州漂蕩尤甚時有咒土僧念尊勝修淨衆寺三年山川晏寧五稼豐稔梁漢夔峽東西五千餘里山河肅靜六年昭宗皇帝遇害少帝禪位梁時三軍縞素舉哀七年秋九月文武勸進羣議云云蜀主即皇帝位改唐天復七年為武成元年郊祀天地大赦境內赦文曰圓蓋方輿萬彚共資其覆載春生夏長四時不息於推遷所以茂成嵗功寧遂物性帝王取象文質遞興遵革故之令猷敷鼎新之至理朕上膺眷命俯徇樂推宗廟告虔孝思既展郊丘備禮嚴配式遵欽承享國之符允叶奉天之道祀羣咸秩有感必通雲龍方覩於在天雷雨須聞於作解且湯開三面延景祚六百餘年漢革五刑繼丕圖二十四世皆以恤辜宥罪勸善興仁特行滌蕩之恩用致洽平之化自唐朝運改土德數終初乃召冦以纒兵竟至遷都而滅國賢良塗炭朝市丘墟生人既失其所天大事須歸於有土遂至蠻夷瀝欵士庶傾心謂蜀都同章武之時兼漢嗣絶山陽之號共陳天命屬在朕躬一從踐位以來倍軫臨深之懼每念生民塗炭刑政猶繁因告類於穹旻合流恩於屬縣紀年定厯既正鴻名布澤行春式和均氣可大赦天下改唐天復八年為大蜀武成元年正月十日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正見繫囚徒常赦不原者咸赦除之唯十惡五逆屠牛鑄錢故意殺人捏窠造印結聚徒黨逃走背軍合和毒藥私鹽茶麵持仗行劫宫典犯枉法贓兼渝濫身名冒授官爵囹圄之內官吏用情致令寃濫不問有贓不在赦限左降官不問罪輕重並與量移其有情無狡蠱事不邪者委中書門下酌量矜貸使與牽復授官州縣典吏及諸色人配流在逺已經懲斷者並宜釋罪放歸兼有軍人百姓先有公事關連逃避諸州縣鎮不敢歸還者亦任却歸本貫所在不得勘問擾攪朕自援旗誓衆仗鉞平戎廓定封疆安保生聚克成帝業實用武功每思將師之勞宜奬初終之效其在城及東川山南武定武信武泰等道并兩路前軍諸鎮都頭節級將士等一時即位日雖已各有頒賜既經大禮更示殊恩應都兵知馬使已下至節級官健今有優給各有等第處分稼穡雖登黎元未泰每於旦夕常所焦勞將漸致於昭蘇已纍行其矜放但念方屯師旅難闕賦征緣同切於乂安宜共資其瞻給自去年八月已後十月已前繼有指揮併蠲逋欠非無惠澤下及蒸人尚慮疲羸未息艱苦畿內諸州及諸州府應徴今年夏稅每貫量放二百文今年正月九日已前應在府及州縣鎮軍人百姓先因侵欠官中錢物或保纍填陪官中收沒屋舍莊田除已有指揮及有人經管收買外餘無人射買者有本主及妻兒見在無處營生者並宜給還却據元額輸納本户稅賦冬選之人例聞羈旅常思任用以救棲遲兼勸進官僚人數不少朕昨才登寶位更布㒤恩或擢在班行或委之州縣凡選用略盡搜羅其間或有謬結前銜妄稱入仕既未辨其真偽又可哀其困窮是用銓衡冀分玉石切在精研選士托實推公自執規繩勿隨請託但曽經赴任委不敗官不犯刑章人無贓汚告敕圓備考課分明便仰依資注官銓司不得稽滯如有失墜告敕無以自眀但有失墜時公慿及於本任官處取得文解者並準例參選然則是唐朝兵革之後渝濫尤多附勢力者未必有材抱孤直者或聞無位自今已後委有司博求幹濟慎擇端良諳熟吏途詳明法律先能潔已方可理人就中令録之尤難切在銓衡之精選或有節度刺史上表論薦皆須審諸行事顯著才能保無苛虐之心方允奏陳之命如聞失舉必罪所知諸州府或有賢良方正能直言極諌者達於教化明於吏才政術精詳軍謀宏逺韜光待用藏器俟時或智辨過人或詞華出格或隱山林之迹或聞鄉里之稱仰所在州府奏聞當與量材敘用自唐室傾淪梁圍篡奪上國俄成於茂草中原莫有其遺民三百年之文物一空數千里之生靈無主星辰既紊運祚俄遷捐王氣之東沉聽頌聲之西起率土之黔黎老幼竟獻臣心滿朝之文武忠賢皆陳天意克隆基業合重奬酬應內外文武官等或賜功臣名號或與一子出身兼勸進官資以旌勳業並當續有處分朕頃事唐臣嘗居親衛受藩鎮封崇之貴著册書鍾鼎之勳至於朝右公卿方面侯伯皆契忘家之誓俱同許國之誠其殁身王事之中遇禍賊庭之內言念及此痛憤良深應自僖宗朝凡在有功文武大臣顯忠孝者並委中書門下追贈仍搜訪骨肉量材録用又在閬州起義之日應有隨駕大將效命功臣或遘疾以淪亡或當鋒而夭枉皆是捐軀為主臨難喪生殊功無日而暫忘遺烈千年而不泯並委中書門下抄録次第各與追贈有子孫者特授官榮所冀澤被幽明仁霑存沒又自朕剖符之始分閫已來副豫委用之心匡贊勳庸之士同甘共苦竭節輸誠推公不避於流言臨事唯思於盡瘁則有故武信軍節度使張琳操持徑直才術縱橫成今日之鴻基自斯人之懿績不享朝天之祿遽興失手之悲言念前功常思厚報宜追贈太尉以報幽寃其嗣子更加正官仍賜章綬故山南節度使王宗滌早膺任用纍著勳勤征行不憚於風塵陳敵常先於士卒論其實效可謂勞臣無何以富貴生驕災殃自掇不守初終之節遽萌悖慢之心驗人情而共憤滿盈定國法而難私斷割遂行典憲深用矜傷當景運之初興在故臣之可念宜加洗雪用慰幽冥宗滌並却還在身官爵故茂州刺史張造故蜀州刺史李師泰故卭州刺史李簡故眉州刺史張勍故漢州刺史宗裕都知兵馬使劉璋奉禮蓋獲張全真張行立韓在田威等並宜追贈朕自臨蜀國實庇齊民皆資先哲之威靈獲王故都之城邑方慿幽贊以永天休上答玄功宜尊舊號先主昭主昭烈皇帝宜委中書門下追崇尊號闕備册儀忠武侯諸葛亮别加美諡追贈王爵應有名山大川靈祠聖迹皆豐凶所係水旱是司並宜追贈公侯用酬玄貺朕爰自統臨八國同心諸藩部落首領已下宜差使臣各賜詔敕分物宣諭其見在鴻臚禮院入朝藩客等各賜分物續有勑旨處分刺史縣令身皆受職寵在分憂非唯效答於恩榮亦在保全於終始將申報國只計安人其有徭役不均刑法不中鄉縣凋弊稅賦逋懸必當分命使臣大明黜陟若清亷可奬課績有聞或就轉官資或超加任用並舉勸懲之命以彰悔過之名太倉及諸州縣受納斛斗並仰太府寺準舊例授勘逐年給付所司餘本分闕剩外不得加一升一合致百姓積纍逋懸如有故違必行朝典其有外州逺縣官吏等輒徴估價並許百姓詣闕論訴不計官職髙卑並正刑名處分在京百司禁囚徒推效業咸皆招本罪本官詳斷只據所申倘闕深文便行極法或恐推司人吏抑遏代書既不生其本情實慮遭其枉法自今後委御史臺常加覺察若有寃濫便具奏聞必當别遣推窮重行懲斫致理之源無先養老化民之本尤重恤孤或矜黃髮之年或念白華之節衰老者宜加矜恤孤􅑏者亦在撫安應國內有耆老年八十已上賜米二石九十已上賜米三石百嵗已上賜米五石兼綿絹酒肉有差並仰所在長吏切加安存其有不幸者量與津置殯送仍撫其孤弱義夫節婦孝子順孫並加旌表門閭終身優假國之教化庠序為先民之威儀禮樂為本廢之則道替崇之則化行其國子監直令有司約故事速具修之兼諸州應有舊文宣王廟各仰崇飾以時釋奠應是前朝舊制或有開國新規制敕之所未該教化之所未備或刑法不中或倫序有乖則諌臣不可不言宰執不可不奏且謗木之設本俟諍臣匭函所收先覽寃狀所以凡聞利病悉要聞知自今已後或事有便宜理非允當並須旋具論奏共議改更必當留折檻以旌賢無或懼觸鱗而避事應南郊行事亞獻終獻攝事行禮官吏等改轉優賜並候續敕處分應飛龍間廄內作器仗諸雜工巧黃衣三衛四色細仗掌肩黃鍾典彭等亦各委所司分析姓名申奏當議優賞駙馬都尉普息之後仍各賜一子八品正員官赦內有未該恩例及合條疏事件各仰所司起請施行開國之初既勤行於德惠改元之後尤企望於樂推惟是革弊從新去華務實有利於民者不得不用有害於政者不得不除公平必致於民安富庶自成於國霸恩雖不吝法且無私赦宥者各仰自新釐革者皆宜共守俾從滌蕩永致清平敢以赦前該恩事相告者以其罪罪之挾藏軍器亡命山澤百日不前復罪如初赦書日行五百里仍付所司牒至準敕故牒錦里耆舊傳卷一
